  <!-- Annotations -->
  <line x1="220" y1="375" x2="155" y2="430" stroke="rgba(255,255,255,0.36)" stroke-dasharray="2 3"/>
  <text x="80" y="445" fill="rgba(255,255,255,0.55)" font-family="ui-monospace,'Space Mono',monospace" font-size="10" letter-spacing="2" font-weight="700">11px · 36% opacity</text>

  <line x1="600" y1="395" x2="600" y2="430" stroke="rgba(255,255,255,0.36)" stroke-dasharray="2 3"/>
  <text x="600" y="445" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="ui-monospace,'Space Mono',monospace" font-size="10" letter-spacing="2" font-weight="700">14px BOLD · 100% accent · 320×48px</text>

  <text x="64" y="496" fill="rgba(255,255,255,0.36)" font-family="ui-monospace,'Space Mono',monospace" font-size="10" letter-spacing="2" font-weight="700">MISDIRECTION · VISUAL WEIGHT MAKES THE DECISION</text>
</svg>
