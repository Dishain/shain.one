<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Misdirection - imbalanced CTAs">
  <rect width="960" height="540" fill="#0A0A0A"/>
  <rect x="48" y="48" width="864" height="444" fill="none" stroke="#2A2A2A"/>

  <!-- Modal -->
  <rect x="180" y="100" width="600" height="320" fill="#111111" stroke="#2A2A2A"/>
  <text x="220" y="160" fill="rgba(255,255,255,0.86)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="22" font-weight="500">Continue with Premium?</text>
  <text x="220" y="200" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="14">Your trial ends today. Keep your saved boards, exports, and history.</text>

  <!-- Tiny gray cancel -->
  <text x="220" y="370" fill="rgba(255,255,255,0.36)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="11" text-decoration="underline">cancel</text>

