<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Forced continuity - no warning before charge">
  <rect width="960" height="540" fill="#0A0A0A"/>
  <rect x="48" y="48" width="864" height="444" fill="none" stroke="#2A2A2A"/>

  <text x="80" y="100" fill="rgba(255,255,255,0.36)" font-family="ui-monospace,'Space Mono',monospace" font-size="10" letter-spacing="2" font-weight="700">TIMELINE · FREE TRIAL</text>

  <!-- Timeline axis -->
  <line x1="100" y1="260" x2="880" y2="260" stroke="#2A2A2A"/>

  <!-- Day markers -->
  <g font-family="ui-monospace,'Space Mono',monospace" font-size="11">
    <!-- Day 1 -->
    <circle cx="140" cy="260" r="6" fill="#FF7849"/>
    <text x="140" y="240" text-anchor="middle" fill="rgba(255,255,255,0.86)">DAY 1</text>
    <text x="140" y="295" text-anchor="middle" fill="rgba(255,255,255,0.55)">Sign up</text>
    <text x="140" y="313" text-anchor="middle" fill="rgba(255,255,255,0.36)">card on file</text>

    <!-- Day 4 -->
    <circle cx="320" cy="260" r="4" fill="#2A2A2A"/>
    <text x="320" y="240" text-anchor="middle" fill="rgba(255,255,255,0.36)">DAY 4</text>
    <text x="320" y="295" text-anchor="middle" fill="rgba(255,255,255,0.36)">silence</text>

    <!-- Day 6 -->
    <circle cx="500" cy="260" r="4" fill="#2A2A2A"/>
    <text x="500" y="240" text-anchor="middle" fill="rgba(255,255,255,0.36)">DAY 6</text>
    <text x="500" y="295" text-anchor="middle" fill="rgba(255,255,255,0.36)">silence</text>

    <!-- Day 7 -->
    <circle cx="680" cy="260" r="6" fill="#2A2A2A" stroke="rgba(255,255,255,0.36)"/>
    <text x="680" y="240" text-anchor="middle" fill="rgba(255,255,255,0.55)">DAY 7</text>
    <text x="680" y="295" text-anchor="middle" fill="rgba(255,255,255,0.55)">trial ends</text>
    <text x="680" y="313" text-anchor="middle" fill="rgba(255,255,255,0.36)">no email sent</text>

    <!-- Day 8 - charge -->
    <circle cx="840" cy="260" r="8" fill="#FF7849"/>
    <text x="840" y="240" text-anchor="middle" fill="#FF7849" font-weight="700">DAY 8</text>
    <text x="840" y="295" text-anchor="middle" fill="#FF7849" font-weight="700">-$99 CHARGED</text>
    <text x="840" y="313" text-anchor="middle" fill="rgba(255,255,255,0.36)">"as agreed"</text>
  </g>

  <text x="80" y="380" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="13">No reminder. No "your trial ends tomorrow" email. The auto-renewal is the product.</text>

  <text x="64" y="476" fill="rgba(255,255,255,0.36)" font-family="ui-monospace,'Space Mono',monospace" font-size="10" letter-spacing="2" font-weight="700">FORCED CONTINUITY · CHARGE WITHOUT WARNING</text>
</svg>
