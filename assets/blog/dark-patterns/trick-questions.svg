<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Trick question checkboxes">
  <rect width="960" height="540" fill="#0A0A0A"/>
  <rect x="48" y="48" width="864" height="444" fill="none" stroke="#2A2A2A"/>

  <text x="80" y="100" fill="rgba(255,255,255,0.86)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="16" font-weight="500">Email preferences</text>

  <!-- Checkbox 1: pre-checked, double negative -->
  <rect x="80" y="150" width="20" height="20" fill="#FF7849" stroke="#FF7849"/>
  <polyline points="84,160 89,164 96,156" stroke="#0A0A0A" stroke-width="2" fill="none"/>
  <text x="120" y="166" fill="rgba(255,255,255,0.86)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="13">I do not want to not receive promotional emails from our partners.</text>

  <!-- Checkbox 2: pre-checked, opposite framing -->
  <rect x="80" y="200" width="20" height="20" fill="#FF7849" stroke="#FF7849"/>
  <polyline points="84,210 89,214 96,206" stroke="#0A0A0A" stroke-width="2" fill="none"/>
  <text x="120" y="216" fill="rgba(255,255,255,0.86)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="13">Uncheck if you don't want us to share your data with affiliates.</text>

  <!-- Checkbox 3: clear -->
  <rect x="80" y="250" width="20" height="20" fill="none" stroke="rgba(255,255,255,0.55)"/>
  <text x="120" y="266" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="13">Send me weekly newsletter.</text>

  <text x="80" y="320" fill="rgba(255,255,255,0.36)" font-family="ui-monospace,'Space Mono',monospace" font-size="10" letter-spacing="2" font-weight="700">PARSING TIME PER USER</text>
  <text x="80" y="350" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif,'Space Grotesk',system-ui" font-size="13">Each line takes 8-15s of careful reading. Most people scan, default-accept, click Next.</text>

  <text x="64" y="476" fill="rgba(255,255,255,0.36)" font-family="ui-monospace,'Space Mono',monospace" font-size="10" letter-spacing="2" font-weight="700">TRICK QUESTIONS · CONFUSED CONSENT</text>
</svg>
