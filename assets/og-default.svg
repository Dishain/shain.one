<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="shain.one - Dmytro Shain - Product Design Lead">
  <defs>
    <pattern id="dotsog" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="rgba(255,255,255,0.07)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#dotsog)"/>

  <!-- Hairline frame -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Top-left: brand dot + label -->
  <circle cx="64" cy="64" r="6" fill="#F4D700"/>
  <text x="86" y="69" fill="rgba(255,255,255,0.86)" font-family="Helvetica-Bold,Helvetica,sans-serif" font-size="13" letter-spacing="3" font-weight="700">SHAIN.ONE</text>

  <!-- Top-right: monos -->
  <text x="1136" y="69" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Helvetica-Bold,Helvetica,sans-serif" font-size="11" letter-spacing="2.4" font-weight="700">PORTFOLIO &#8226; BLOG</text>

  <!-- Big mark - Helvetica Bold instead of Doto -->
  <text x="80" y="380" fill="#FFFFFF" font-family="Helvetica-Bold,Helvetica,sans-serif" font-size="220" letter-spacing="-6" font-weight="700">SHAIN.</text>

  <!-- Subline -->
  <text x="84" y="446" fill="rgba(255,255,255,0.86)" font-family="Helvetica,sans-serif" font-size="28" font-weight="400">Dmytro Shain - Product Design Lead</text>
  <text x="84" y="482" fill="rgba(255,255,255,0.55)" font-family="Helvetica,sans-serif" font-size="20" font-weight="300">B2B &#8226; SaaS &#8226; Design systems &#8226; AI-powered UX. 7+ years.</text>

  <!-- Bottom monos -->
  <text x="64" y="572" fill="rgba(255,255,255,0.36)" font-family="Helvetica-Bold,Helvetica,sans-serif" font-size="11" letter-spacing="2.4" font-weight="700">SHAIN.ONE</text>
  <text x="1136" y="572" text-anchor="end" fill="rgba(255,255,255,0.36)" font-family="Helvetica-Bold,Helvetica,sans-serif" font-size="11" letter-spacing="2.4" font-weight="700">2026</text>
</svg>
